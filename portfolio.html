<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

  <title>Portfolio</title>

  <style>
    .serif-font {
      font-family: 'Cormorant Garamond', serif;
    }

    .main-font {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-[#f4efe4] main-font">

  <section class="min-h-screen flex items-center justify-center px-6 md:px-16 py-10">
    
    <div class="max-w-7xl w-full grid md:grid-cols-2 gap-10 items-center">

      <div class="space-y-8">

        <p class="text-sm text-gray-700 tracking-wider">✦ 2026 ✦</p>

        <div>
          <h1 class="text-3xl md:text-7xl font-light text-blue-600 uppercase leading-none">
            Front End Dev
          </h1>
          <h2 class="text-5xl md:text-6xl italic text-blue-600 serif-font -mt-2">
            Portfolio
          </h2>
        </div>

        <div class="relative">
          <img 
            src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d"
            alt="portfolio image"
            class="w-full max-w-xl h-[300px] object-cover shadow-md"
          />

          <div class="absolute -bottom-6 left-4 flex gap-4">
            <div class="w-14 h-14 border-4 border-blue-500 rounded-full"></div>
            <div class="w-14 h-14 border-4 border-blue-500 rounded-full"></div>
            <div class="w-14 h-14 border-4 border-blue-500 rounded-full"></div>
          </div>
        </div>
      </div>

      <div class="space-y-6 flex flex-col justify-center">

        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center italic text-lg">
            by
          </div>

          <h3 class="text-2xl font-light text-gray-800 tracking-wide">
            Mark Icban
          </h3>
        </div>

        <p class="text-gray-700 text-lg max-w-md leading-relaxed">
          I’m a Front-End Developer passionate about building modern,
        responsive, and user-friendly websites that combine clean code,
        smooth interactions, and visually appealing designs.
        </p>

        <button class="bg-blue-600 text-white px-8 py-3 w-fit hover:bg-blue-700 transition duration-300">
          View Projects
        </button>
      </div>

    </div>

  </section>

</body>
</html>
